- name: Install and removing packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: install packages
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
  loop:
  - { name: 'nginx', state: 'present'}
  - { name: 'httpd', state: 'absent'}
  - { name: 'mysql', state: 'present'}
  - { name: 'postfix', state: 'absent'}