- name: devops course information
  hosts: local
  connection: local # for localhosts
  vars:
    course: "Devops with AWS" #string
    duration: 120 #number
    topics: #list
    - Linux
    - shell
    - Ansible
    - Terraform
    - AWS
    - K8
    live: true #boolean
    tools: #map/dictionary - key value pairs
      ci: jenkins
      cm: ansible
      cloud: aws
      aws:
      - IAM
      - s3
  tasks:
  - name: print the information
    ansible.builtin.debug:
      msg: "Hi, I am learning {{course}}, with duration:{{duration}}hrs, topics are: {{topics}}, and live {{live}}, tools are: {{tools}}"