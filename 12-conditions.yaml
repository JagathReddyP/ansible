- name: check a number is less than 10 or not
  hosts: local
  connection: local
  vars_prompt:
  - name: number
    prompt: please enter the number
    private: false #not condidential
  tasks: 
  - name: print if less than 10
    ansible.builtin.debug:
      msg: "Given number {{number}} is less than 10" 
    when: number| int < 10 # | int it is called filters

  - name: print if greater than 10
    ansible.builtin.debug:
      msg: "Given number {{number}} is greater than 10" 
    when: number| int > 10 