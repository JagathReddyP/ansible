- name: demo on filters
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: print the default variables
    ansible.builtin.debug:
     msg: "Hello {{ course| default('Ansible') }}"

  - name: Convert into uppercase
    vars:
     greeting: "Hello Ramesh"
    ansible.builtin.debug:
     msg: "{{ greeting| upper }}"

  - name: convert into lowercase
    vars:
     greeting: "Hello Suresh"
    ansible.builtin.debug:
     msg: "{{ greeting | lower }}"

  - name: Get unique values
    vars:
     number: [1,2,3,45,46,3,2,1,6]
    ansible.builtin.debub:
     msg: "{{ number | unique }}"