- name: create ec2 servers and r53 records
  hosts: local
  connection: local #we dont need become:yes because we are not installing anything we are just connecting
  vars:
    subnet_id: "subnet-080356a988c290184"
    sg_id: "sg-04ba9fcd3b0e49e39"
    ami_id: "ami-0220d79f3f480ecf5" 
    instances:
    - mysql
    - backend
    - frontend
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      vpc_subnet_id: "{{subnet_id}}"
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
    loop: "{{ instances }}"
    register: ec2_instances

  - name: print the output
    ansible.builtin.debug:
     msg: " {{ ec2_instances }}"


